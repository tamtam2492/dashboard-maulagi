name: Runtime Secret Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run verify-only or live sync
        required: true
        type: choice
        default: verify
        options:
          - verify
          - sync
      target:
        description: Runtime target to process
        required: true
        type: choice
        default: all
        options:
          - all
          - vercel
          - lambda
      function_name:
        description: Optional Lambda function name when target=lambda
        required: false
        type: string
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read

concurrency:
  group: runtime-secret-sync
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  BWS_PROJECT_ID: 325dd874-7e08-4c76-83f6-b432000c9b69
  VERCEL_ORG_ID: team_Yj36bVurUwEdLSttvj9rFHic
  VERCEL_PROJECT_ID: prj_rOCZPBVq8JLTANkHiqCxUhit8Uny

jobs:
  sync-runtime:
    runs-on: ubuntu-latest
    env:
      INPUT_MODE: ${{ github.event.inputs.mode }}
      INPUT_TARGET: ${{ github.event.inputs.target }}
      INPUT_FUNCTION_NAME: ${{ github.event.inputs.function_name }}
      BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
      SYNC_SECRET_SOURCE: bws
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Bitwarden CLI
        shell: bash
        run: |
          curl -fsSL https://bws.bitwarden.com/install | sh
          bws --version

      - name: Prepare Vercel project metadata
        shell: bash
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<'EOF'
          {"projectId":"prj_rOCZPBVq8JLTANkHiqCxUhit8Uny","orgId":"team_Yj36bVurUwEdLSttvj9rFHic","projectName":"dashboard-transfer-maulagi"}
          EOF

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Configure AWS credentials
        if: ${{ (github.event.inputs.target || 'all') == 'all' || (github.event.inputs.target || 'all') == 'lambda' || github.event_name == 'schedule' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify or sync runtime secrets
        shell: bash
        run: |
          set -euo pipefail

          SYNC_MODE="${INPUT_MODE:-}"
          SYNC_TARGET="${INPUT_TARGET:-all}"
          FUNCTION_NAME="${INPUT_FUNCTION_NAME:-}"

          if [ -z "$SYNC_MODE" ]; then
            if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
              SYNC_MODE="sync"
            else
              SYNC_MODE="verify"
            fi
          fi

          CMD=(node scripts/local/sync-bws-runtime.js --project-id "$BWS_PROJECT_ID" --source "$SYNC_SECRET_SOURCE" --target "$SYNC_TARGET")

          if [ -n "$FUNCTION_NAME" ]; then
            CMD+=(--function "$FUNCTION_NAME")
          fi

          if [ "$SYNC_MODE" = "verify" ]; then
            CMD+=(--verify-only)
          fi

          echo "Running mode=$SYNC_MODE target=$SYNC_TARGET"
          "${CMD[@]}"
