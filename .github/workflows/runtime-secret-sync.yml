name: Runtime Secret Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run verify-only or live sync
        required: true
        type: choice
        default: verify
        options:
          - verify
          - sync
      target:
        description: Runtime target to process
        required: true
        type: choice
        default: all
        options:
          - all
          - vercel
          - lambda
      function_name:
        description: Optional Lambda function name when target=lambda
        required: false
        type: string
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read

concurrency:
  group: runtime-secret-sync
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  BWS_PROJECT_ID: 325dd874-7e08-4c76-83f6-b432000c9b69
  VERCEL_ORG_ID: team_Yj36bVurUwEdLSttvj9rFHic
  VERCEL_PROJECT_ID: prj_rOCZPBVq8JLTANkHiqCxUhit8Uny

jobs:
  sync-runtime:
    runs-on: ubuntu-latest
    env:
      INPUT_MODE: ${{ github.event.inputs.mode }}
      INPUT_TARGET: ${{ github.event.inputs.target }}
      INPUT_FUNCTION_NAME: ${{ github.event.inputs.function_name }}
      SYNC_SECRET_SOURCE: env
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Prepare Vercel project metadata
        shell: bash
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<'EOF'
          {"projectId":"prj_rOCZPBVq8JLTANkHiqCxUhit8Uny","orgId":"team_Yj36bVurUwEdLSttvj9rFHic","projectName":"dashboard-transfer-maulagi"}
          EOF

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Configure AWS credentials
        if: ${{ (github.event.inputs.target || 'all') == 'all' || (github.event.inputs.target || 'all') == 'lambda' || github.event_name == 'schedule' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Load runtime secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            1a8d0336-fa41-46e5-91ca-b432000eb26d > SUPABASE_URL
            c213e47b-fa78-4a36-8f71-b432000f2925 > SUPABASE_ANON_KEY
            3d95a97d-84fb-4f3a-bdc0-b43200104224 > SUPABASE_SERVICE_ROLE_KEY
            69c46ab9-e399-4e09-9cc5-b43200108efe > MAUKIRIM_WA
            cb3e2a68-d04a-4930-a4c7-b4320010a5b1 > MAUKIRIM_PASS
            e533b576-a2cd-4833-b96d-b4320010ef6a > GROQ_API_KEY
            aa75be6b-205a-427f-8688-b432001156f7 > OCR_SYNC_SECRET
            b0cd6cd6-b667-4ed4-a161-b4320011fc77 > TELEGRAM_NOTIFY_URL
            6e134f3d-ebe4-4a7a-8478-b43200122b1d > TELEGRAM_NOTIFY_SECRET
            5b71f343-10b4-4524-ba2d-b43200123fb9 > TELEGRAM_NOTIFY_SOURCES
            418c70a7-89f6-420b-b1cf-b432001262ee > TELEGRAM_NOTIFY_SERVICE
            5ba6978e-a333-48f1-88f0-b43200129065 > UPSTASH_REDIS_REST_URL
            dcb5eca9-159e-44e0-a270-b432001511a0 > UPSTASH_REDIS_REST_TOKEN
            8f0521c1-742c-4d6e-860c-b4320015f1c9 > NONCOD_SYNC_SECRET
            318ea5db-b500-4c12-8e31-b43200160e9e > NONCOD_PIPELINE_TRIGGER_URL
            67d5d81c-165d-4f22-9a75-b432001635ea > NONCOD_PIPELINE_TRIGGER_SECRET
            f471c580-b6cb-4b3a-bdd0-b43200167478 > CRON_SECRET
            6e80db67-28ad-4d31-ba42-b432001783bf > TELEGRAM_CHAT_ID
            2441900d-a461-45c7-a517-b4320017ac08 > TELEGRAM_BOT_TOKEN

      - name: Verify or sync runtime secrets
        shell: bash
        run: |
          set -euo pipefail

          SYNC_MODE="${INPUT_MODE:-}"
          SYNC_TARGET="${INPUT_TARGET:-all}"
          FUNCTION_NAME="${INPUT_FUNCTION_NAME:-}"

          if [ -z "$SYNC_MODE" ]; then
            if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
              SYNC_MODE="sync"
            else
              SYNC_MODE="verify"
            fi
          fi

          CMD=(node scripts/local/sync-bws-runtime.js --source env --target "$SYNC_TARGET")

          if [ -n "$FUNCTION_NAME" ]; then
            CMD+=(--function "$FUNCTION_NAME")
          fi

          if [ "$SYNC_MODE" = "verify" ]; then
            CMD+=(--verify-only)
          fi

          echo "Running mode=$SYNC_MODE target=$SYNC_TARGET"
          "${CMD[@]}"
